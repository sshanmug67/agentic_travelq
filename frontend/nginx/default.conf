# nginx/default.conf
# TravelQ — Nginx Reverse Proxy Configuration
# =============================================
# Serves React static files + proxies /api/* to FastAPI backend
#
# How it works:
#   Browser → Nginx :80
#     ├── /           → serves React static files (index.html, JS, CSS)
#     ├── /api/*      → proxies to FastAPI backend :8000
#     └── anything else → falls back to index.html (React Router)

upstream fastapi_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # --- React Frontend (static files) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # React Router: any unmatched path serves index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite adds hashes to filenames)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- API Proxy to FastAPI Backend ---
    # Matches: /api/trips/search, /api/trips/health, /api/trips/{id}/status, etc.
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;

        # Pass real client info to FastAPI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Longer timeouts for AI agent processing
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;

        # Buffering for larger AI responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # --- Block sensitive files ---
    location ~ /\. {
        deny all;
        return 404;
    }
}
