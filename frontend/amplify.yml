applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - |
              if [ "$AWS_BRANCH" = "main" ]; then
                echo "VITE_API_URL=https://api.agentic-travelq.com/api" >> .env.production
              else
                echo "VITE_API_URL=https://api-dev.agentic-travelq.com/api" >> .env.production
              fi
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend