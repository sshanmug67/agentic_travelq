# frontend/amplify.yml
# AWS Amplify build configuration for TravelQ React frontend
# Only needed if you use Amplify for frontend hosting (optional)

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "VITE_API_URL=$VITE_API_URL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
