# ============================================================================
# Agentic Travel Dashboard - Application Configuration
# ============================================================================
# Location: AGENTIC_TRAVELQ/config/app_config.yaml
#
# IMPORTANT: This file may contain secrets (API keys).
#            Add to .gitignore: app_config.yaml
#            Use app_config.example.yaml as a template for others.
# ============================================================================

# --- Application ---
app:
  name: "Agentic Travel Dashboard"
  environment: "development"    # development | staging | production
  debug: true
  log_level: "INFO"             # DEBUG | INFO | WARNING | ERROR

# --- API Server ---
api:
  host: "0.0.0.0"
  port: 8000
  reload: true                  # Auto-reload on code changes (dev only)
  prefix: "/api"

# --- CORS ---
cors:
  origins:
    - "https://dev.d9akaerw4i65m.amplifyapp.com"
    - "https://dev.agentic-travelq.com"
    - "https://agentic-travelq.com"
    - "http://localhost:3000"
    - "http://localhost:5173"

# --- Logging & Rotation ---
# Controls RotatingFileHandler settings for all log files.
# Python app writes to disk; CloudWatch Agent tails the active .log files.
# Backup files (.log.1, .log.2, etc.) are local safety nets only.
#
# Disk budget formula:
#   Root:   3 files × (max_bytes_mb × (1 + backup_count)) = 3 × 40 MB = 120 MB
#   Agents: 7 agents × (max_bytes_mb × (1 + backup_count)) = 7 × 20 MB = 140 MB
#   Total:  ~260 MB worst case
logging:
  root:
    max_bytes_mb: 10            # Max size per root log file before rotation
    backup_count: 3             # Number of rotated backups to keep
  agents:
    max_bytes_mb: 5             # Max size per agent log file before rotation
    backup_count: 3             # Number of rotated backups to keep

# --- Supabase ---
supabase:
  url: null
  anon_key: null

# --- OpenAI ---
openai:
  api_key: null
  llm_model: "gpt-4o-mini"
  embedding_model: "text-embedding-3-small"

# --- Weather API ---
weather:
  api_key: null
  provider: "openweather"       # openweather | weatherapi

# --- Amadeus API (Flights) ---
amadeus:
  client_id: null               # Also accepts AMADEUS_API_Key from env
  client_secret: null           # Also accepts AMADEUS_API_Secret from env

# --- Optional External APIs ---
external_apis:
  google_places_key: null
  ticketmaster_key: null

# --- Autogen Configuration ---
autogen:
  config_list: []               # List of LLM configurations for Autogen
  cache_seed: 42                # Seed for caching
  timeout: 120                  # Timeout in seconds

# --- Agent Configuration ---
agents:
  flight:
    enabled: true
    max_results: 15             # Max flight results to return

  hotel:
    enabled: true
    max_results: 15             # Max hotel results to return

  weather:
    enabled: true
    forecast_days: 5            # Number of days to forecast

  events:
    enabled: true
    max_results: 20             # Max events to return

  places:
    enabled: true
    max_results: 50             # Max places to return (fallback for uncategorized)
    restaurants_max_results: 15 # Max restaurant results to return
    activities_max_results: 15  # Max activity results to return

  orchestrator:
    enabled: true
    parallel_execution: true    # Run agents in parallel

# --- Rate Limiting ---
rate_limit:
  enabled: false
  requests_per_minute: 60

# --- Caching ---
cache:
  enabled: true
  ttl_seconds: 300              # 5 minutes default cache
  flight_ttl: 1800              # 30 minutes for flight data
  weather_ttl: 3600             # 1 hour for weather data
  events_ttl: 86400             # 24 hours for events