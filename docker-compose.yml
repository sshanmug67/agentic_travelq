# Docker Compose — TravelQ Async Pipeline
# Location: docker-compose.yml (project root)
#
# Services:
#   redis    — Data store for trip state, agent status, results
#   api      — FastAPI server (receives requests, returns immediately)
#   worker   — Celery worker (runs preprocessing + orchestration)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f worker # Watch Celery worker logs
#   docker-compose down           # Stop all services
#
# Development (run API locally, just use Redis + Worker):
#   docker-compose up -d redis    # Start Redis only
#   cd backend && uvicorn main:app --reload  # Run API locally
#   cd backend && celery -A celery_app worker --loglevel=info --pool=solo

version: "3.8"

services:
  # ────────────────────────────────────────────────────────────────────
  # Redis — Broker + Result Backend + Trip State Store
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: travelq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # FastAPI — HTTP Server (returns immediately, dispatches to Celery)
  # ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelq-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AMADEUS_CLIENT_ID=${AMADEUS_CLIENT_ID}
      - AMADEUS_CLIENT_SECRET=${AMADEUS_CLIENT_SECRET}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - XOTELO_API_KEY=${XOTELO_API_KEY}
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Celery Worker — Runs preprocessing + agent orchestration
  # ────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelq-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AMADEUS_CLIENT_ID=${AMADEUS_CLIENT_ID}
      - AMADEUS_CLIENT_SECRET=${AMADEUS_CLIENT_SECRET}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - XOTELO_API_KEY=${XOTELO_API_KEY}
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: celery -A celery_app worker --loglevel=info --pool=solo --concurrency=2
    restart: unless-stopped

volumes:
  redis_data: